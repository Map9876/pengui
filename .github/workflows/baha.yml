name: Baha Fetch


on:
  schedule:
    - cron: "0 18 * * *"
  push:
    paths:
      - 'baha/**'

env:
  TZ: Asia/Shanghai

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python3
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip3 install requests

      - name: Start FlareSolverr
        run: |
          docker run -d --name flaresolverr \
            -p 8191:8191 \
            -e LOG_LEVEL=info \
            ghcr.io/flaresolverr/flaresolverr:latest
          echo "Waiting for FlareSolverr to start..."
          sleep 15
          curl -s http://localhost:8191/ || echo "FlareSolverr not ready yet"

      - name: Fetch ani.gamer.com.tw
        run: python3 ./baha/fetch.py
        continue-on-error: true

      - name: Commit results
        env:
          GIT_NAME: GitHub Actions[Bot]
          GIT_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
        run: |
          git config --local user.name $GIT_NAME
          git config --local user.email $GIT_EMAIL
          git add baha/
          git commit -m "baha: fetch at $(date '+%Y-%m-%d %H:%M:%S')" || echo "No changes"
          git push
