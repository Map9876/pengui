<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Penguin Random House Comics - Cover Tracker</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<header>
  <h1>Penguin Random House Comics</h1>
  <p class="subtitle">Daily cover change tracker</p>
</header>

<main>
  <section id="calendar-section">
    <div id="calendar"></div>
  </section>

  <section id="gallery-section">
    <h2 id="gallery-title">Select a date to view covers</h2>
    <div id="gallery" class="masonry"></div>
    <div id="loading" class="hidden">Loading...</div>
  </section>
</main>

<footer>
  <p>Data from <a href="https://prhcomics.com" target="_blank">prhcomics.com</a></p>
</footer>

<script src="app.js"></script>
</body>
</html>
